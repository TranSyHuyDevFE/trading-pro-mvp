<ion-header>
  <ion-toolbar color="primary">
    <ion-title>🔍 Tìm hàng</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-wrapper">
    <!-- Thanh tìm kiếm -->
    <div class="search-container">
      <div class="search-inner">
        <ion-searchbar
          [(ngModel)]="searchKeyword"
          placeholder="Nhập tên sản phẩm (VD: túi xách nữ, áo thun nam...)"
          (ionInput)="null"
          (keyup.enter)="onSearch()"
          animated
          showCancelButton="focus"
        ></ion-searchbar>

        <div class="search-actions">
          <!-- Filter số lượng kết quả -->
          <div class="result-filter">
            <ion-select
              [(ngModel)]="maxResults"
              interface="popover"
              placeholder="Số lượng"
              label="Hiển thị"
              labelPlacement="start"
            >
              <ion-select-option *ngFor="let opt of resultOptions" [value]="opt">
                {{ opt }} xưởng
              </ion-select-option>
            </ion-select>
          </div>

          <ion-button expand="block" (click)="onSearch()" [disabled]="!searchKeyword.trim()">
            <ion-icon name="sparkles-outline" slot="start"></ion-icon>
            Tìm Ngay
          </ion-button>

          <!-- Nút Reset — chỉ hiện khi đã có kết quả -->
          <ion-button
            *ngIf="hasSearched"
            fill="outline"
            color="medium"
            class="reset-btn"
            (click)="resetSearch()"
          >
            <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <app-loading-overlay
      [isLoading]="isLoading"
      message="Hệ thống đang tìm xưởng phù hợp..."
      subMessage="Đang quét ...., phân tích và so sánh giá"
    ></app-loading-overlay>

    <!-- Empty State -->
    <app-empty-state
      *ngIf="!hasSearched && !isLoading"
      icon="search-outline"
      title="Bắt đầu tìm xưởng"
      description="Nhập tên sản phẩm, Hệ thống sẽ tự động quét và trả về kết quả tốt nhất"
    ></app-empty-state>

    <!-- Kết quả tìm kiếm -->
    <div class="results-container" *ngIf="hasSearched && !isLoading">
      <div class="result-header">
        <div class="header-left">
          <ion-text color="medium">
            <p>Tìm thấy <strong>{{ filteredVendors.length }}</strong> xưởng phù hợp</p>
          </ion-text>
        </div>
        
        <!-- Filter sắp xếp nhỏ nhỏ -->
        <div class="sort-filter">
          <ion-icon name="swap-vertical" color="medium"></ion-icon>
          <ion-select
            [(ngModel)]="sortOrder"
            (ionChange)="onSortChange($event)"
            interface="popover"
            toggleIcon="chevron-down-outline"
            label="Sắp xếp"
            labelPlacement="hidden"
          >
            <ion-select-option value="none">Mặc định</ion-select-option>
            <ion-select-option value="asc">Giá: Thấp → Cao</ion-select-option>
            <ion-select-option value="desc">Giá: Cao → Thấp</ion-select-option>
          </ion-select>
        </div>
      </div>

      <!-- ★ Filter quốc gia - chips -->
      <div class="country-filter">
        <button
          *ngFor="let c of countryOptions"
          class="filter-chip"
          [class.active]="selectedCountry === c.value"
          (click)="filterByCountry(c.value)"
        >
          <span class="chip-flag">{{ c.flag }}</span>
          <span class="chip-label">{{ c.label }}</span>
          <span class="chip-count" *ngIf="c.value !== 'ALL'">{{ getCountryCount(c.value) }}</span>
        </button>
      </div>

      <!-- ★ Grid layout: 1 col mobile, 2 col tablet, 3 col desktop -->
      <div class="vendor-grid">
        <app-vendor-card
          *ngFor="let vendor of filteredVendors; let i = index"
          [vendor]="vendor"
          [index]="i"
          (onSelect)="openCalculator($event)"
        ></app-vendor-card>
      </div>

      <!-- Không tìm thấy kết quả -->
      <app-empty-state
        *ngIf="vendors.length === 0"
        icon="alert-circle-outline"
        title="Không tìm thấy xưởng"
        description="Thử thay đổi từ khóa hoặc sử dụng tiếng Trung để có kết quả chính xác hơn"
      ></app-empty-state>
    </div>
  </div>
</ion-content>

<!-- ★ Bottom Sheet: Bảng tính Landed Cost -->
<!-- Đặt NGOÀI ion-content để position:fixed hoạt động đúng -->
<app-cost-calculator
  *ngIf="showCalculator && selectedVendor"
  [vendor]="selectedVendor"
  (onClose)="closeCalculator()"
></app-cost-calculator>
